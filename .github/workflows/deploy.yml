name: Deploy Quran App to AWS

on:
  push:
    branches:
      - main # لو الـ branch بتاعك اسمه master، غير دي لـ master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Build Flutter Web
        run: flutter build web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: docker build -t quran-web-app .

      - name: Save Image as Tar
        run: docker save quran-web-app -o quran-web-app.tar

      - name: Copy Tar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "quran-web-app.tar"
          target: "/home/ubuntu/"

      - name: Run Docker on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            docker load -i /home/ubuntu/quran-web-app.tar
            docker stop quran-container || true
            docker rm quran-container || true
            docker run -d -p 80:80 --name quran-container quran-web-app